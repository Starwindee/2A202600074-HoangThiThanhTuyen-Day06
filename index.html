<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinmec Lumina - AI Chat Assistant</title>
    <!-- Thêm font Inter giống phong cách hiện đại (Umbrel/Apple) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Glow Backgrounds cho Godly Vibe -->
    <div class="glow-bg"></div>
    <div class="glow-bg-2"></div>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">L</div>
                <div class="brand-text">
                    <div class="brand-title">VINMEC LUMINA</div>
                    <div class="brand-subtitle">AI Lab Assistant</div>
                </div>
            </div>

            <div class="sidebar-section-title">BỆNH NHÂN HÔM NAY</div>
            <ul class="patient-list" id="patientList">
                <!-- Javascript sẽ render danh sách bệnh nhân vào đây -->
            </ul>
        </aside>

        <!-- Main Content: Gemini-like Chat Interface -->
        <main class="main-content chat-layout">
            <div class="chat-history" id="chatHistory">
                <!-- Message chào mừng -->
                <div class="message bot-message">
                    <div class="message-avatar bot-avatar">L</div>
                    <div class="message-content">
                        Xin chào! Tôi là Vinmec Lumina. Bạn có thể chọn người bệnh ở thanh bên trái hoặc đặt câu hỏi bất kỳ về kết quả xét nghiệm.
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <textarea id="userInput" class="chat-textarea" placeholder="Nhập câu hỏi hoặc kết quả xét nghiệm để phân tích..." rows="1" onkeydown="handleEnter(event)"></textarea>
                    <button class="send-btn" onclick="sendMessage()"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
                </div>
                <div class="chat-disclaimer">Lumina AI có thể đưa ra kết quả chưa đầy đủ. Hãy luôn đối chiếu kết quả với bác sĩ chuyên khoa Vinmec.</div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
</body>
</html>
